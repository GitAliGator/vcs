# Workflow for deploying VCS website and documentation to GitHub Pages
name: Deploy VCS Website to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt
          
      # CRITICAL: Install the actual VCS package so Sphinx can import it
      - name: Install VCS package
        run: |
          pip install -e .
          
      # Verify that the package can be imported
      - name: Verify package installation
        run: |
          python -c "import vcs; print(f'VCS version: {vcs.__version__}')"
          python -c "from vcs import compute_vcs_score; print('compute_vcs_score imported successfully')"
          python -c "import vcs._visualize_vcs; print('Visualization modules imported successfully')"
          
      - name: Build Sphinx documentation
        run: |
          cd docs
          make html
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Prepare website files
        run: |
          # Ensure the docs directory structure is correct
          ls -la docs/
          echo "Contents of docs/build/html/:"
          ls -la docs/build/html/ || echo "build/html directory not found"
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # FIXED: Upload only the built HTML, not the entire docs directory
          path: './docs/build/html'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
