# Workflow for deploying VCS website and documentation to GitHub Pages
name: Deploy VCS Website to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt
          
      - name: Build Sphinx documentation
        run: |
          cd docs
          make html
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Prepare combined website
        run: |
          # Create a staging directory for the combined site
          mkdir -p _site
          
          # Copy the main website files (playground, example, etc.)
          cp docs/index.html _site/
          cp docs/playground.html _site/
          cp docs/example.html _site/
          cp docs/api.html _site/
          cp docs/script.js _site/
          cp docs/style.css _site/
          
          # Copy any other assets (videos, widgets, etc.)
          if [ -d "docs/videos" ]; then
            cp -r docs/videos _site/
          fi
          if [ -d "docs/widgets" ]; then
            cp -r docs/widgets _site/
          fi
          
          # Copy the built Sphinx documentation to build/html subdirectory
          mkdir -p _site/build
          cp -r docs/build/html _site/build/
          
          # List the structure for debugging
          echo "Final site structure:"
          find _site -type f -name "*.html" | head -20
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the combined site
          path: './_site'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
